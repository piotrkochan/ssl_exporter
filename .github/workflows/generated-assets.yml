name: Generated Assets

on:
  push:
    branches:
      - master
    paths:
      - "charts/**"
      - "Makefile"
      - ".github/workflows/generated-assets.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'

      - name: Set up Helm
        uses: Azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
        with:
          version: v3.18.1

      - name: Generate docs and manifests
        run: |
          make helm-docs
          make manifests

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/ssl-exporter/README.md deploy/manifests
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git commit -m "chore: update generated assets"
          git push
