apiVersion: v1
kind: Service
metadata:
  name: {{ include "ssl-exporter.fullname" . }}
  namespace: {{ include "ssl-exporter.namespace" . }}
  labels:
    {{- include "ssl-exporter.labels" . | nindent 4 }}
    {{- with .Values.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if .Values.service.ipDualStack.enabled }}
  ipFamilies:
    {{- toYaml .Values.service.ipDualStack.ipFamilies | nindent 4 }}
  ipFamilyPolicy: {{ .Values.service.ipDualStack.ipFamilyPolicy }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ssl-exporter.selectorLabels" . | nindent 4 }}
