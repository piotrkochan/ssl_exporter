{{- include "ssl-exporter.validateTLS" . }}
{{- $webConfigEnabled := include "ssl-exporter.webConfigEnabled" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ssl-exporter.fullname" . }}
  labels:
    {{- include "ssl-exporter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ssl-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml" ) . | sha256sum }}
        {{- if and $webConfigEnabled (not .Values.webConfig.existingSecret) }}
        checksum/web-config: {{ include (print $.Template.BasePath "/secret-web-config.yaml" ) . | sha256sum }}
        {{- end }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ssl-exporter.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ssl-exporter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --web.probe-path=/probe
            - --web.listen-address=:{{ .Values.service.port }}
            {{- if .Values.config.enabled }}
            - --config.file=/config/config.yaml
            {{- end }}
            {{- if $webConfigEnabled }}
            - --web.config.file=/etc/web-config/web-config.yaml
            {{- end }}
            {{- range .Values.extraArgs }}
            - {{ . }}
            {{- end }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- include "ssl-exporter.probe" (dict "probe" .Values.livenessProbe "tlsEnabled" .Values.tls.enabled) | nindent 12 }}
          readinessProbe:
            {{- include "ssl-exporter.probe" (dict "probe" .Values.readinessProbe "tlsEnabled" .Values.tls.enabled) | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.config.enabled $webConfigEnabled .Values.tls.enabled .Values.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.config.enabled }}
            - name: config
              mountPath: /config
              readOnly: true
            {{- end }}
            {{- if $webConfigEnabled }}
            - name: web-config
              mountPath: /etc/web-config
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls-certs
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.config.enabled $webConfigEnabled .Values.tls.enabled .Values.extraVolumes }}
      volumes:
        {{- if .Values.config.enabled }}
        - name: config
          configMap:
            name: {{ .Values.config.existingConfigMap | default (include "ssl-exporter.fullname" .) }}
        {{- end }}
        {{- if $webConfigEnabled }}
        - name: web-config
          secret:
            secretName: {{ include "ssl-exporter.webConfigSecretName" . }}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ include "ssl-exporter.tlsSecretName" . }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
