# Default values for ssl-exporter.

global:
  # -- Global image registry override
  imageRegistry: ""

# -- Number of replicas
replicaCount: 1

image:
  # -- Image registry
  registry: ghcr.io
  # -- Image repository
  repository: piotrkochan/ssl_exporter
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion)
  tag: ""
  # -- Image digest. If set, it takes precedence over tag
  digest: ""

# -- Image pull secrets
imagePullSecrets: []
# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""
# -- Override the namespace for namespaced resources
namespaceOverride: ""
# -- Labels added to all resources
commonLabels: {}

# -- Number of old ReplicaSets to retain
revisionHistoryLimit: 10

serviceAccount:
  # -- Create a service account
  create: true
  # -- Automount the service account token
  automountServiceAccountToken: false
  # -- Annotations for the service account
  annotations: {}
  # -- Service account name (generated if not set and create is true)
  name: ""

rbac:
  # -- Create ClusterRole and ClusterRoleBinding for the kubernetes prober. Also set serviceAccount.automountServiceAccountToken=true when using in-cluster auth.
  create: false

# -- Additional pod annotations
podAnnotations: {}
# -- Additional pod labels
podLabels: {}
# -- Additional Deployment annotations
deploymentAnnotations: {}

# -- Pod security context
podSecurityContext:
  fsGroup: 1000

# -- Container security context
securityContext:
  capabilities:
    drop:
      - ALL
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 9219
  # -- Additional Service annotations
  annotations: {}
  # -- Additional Service labels
  labels: {}
  ipDualStack:
    # -- Enable dual-stack Service fields
    enabled: false
    # -- Service IP families
    ipFamilies:
      - IPv6
      - IPv4
    # -- Service IP family policy
    ipFamilyPolicy: PreferDualStack

networkPolicy:
  # -- Create NetworkPolicy for ssl_exporter pods
  enabled: false
  # -- Limit ingress to the monitoring namespace
  allowMonitoringNamespace: false
  # -- Monitoring namespace name used when allowMonitoringNamespace=true
  monitoringNamespaceName: monitoring

# -- Deployment update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# -- Extra command-line arguments for ssl_exporter
extraArgs: []
# - --log.level=debug

# -- Extra environment variables
extraEnv: []
# - name: HTTPS_PROXY
#   value: "http://proxy:8080"

# -- Extra environment variables from ConfigMaps or Secrets
extraEnvFrom: []
# - secretRef:
#     name: ssl-exporter-env

# -- Resource requests and limits
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 50m
  #   memory: 64Mi

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Node selector
nodeSelector: {}

# -- Pod DNS policy
dnsPolicy: ""

# -- Pod DNS config
dnsConfig: {}

# -- Priority class name
priorityClassName: ""

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Topology spread constraints
topologySpreadConstraints: []

# -- PodDisruptionBudget spec. Set maxUnavailable or minAvailable to create it.
podDisruptionBudget: {}
# maxUnavailable: 1

# -- Extra volume mounts for the container
extraVolumeMounts: []
# - name: certs
#   mountPath: /etc/ssl/certs

# -- Extra volumes for the pod
extraVolumes: []
# - name: certs
#   secret:
#     secretName: my-tls-secret

# ServiceMonitor for Prometheus Operator
serviceMonitor:
  # -- Enable ServiceMonitor
  enabled: false
  # -- ServiceMonitor namespace (defaults to release namespace)
  # namespace: monitoring
  # -- ServiceMonitor annotations
  annotations: {}
  # -- Scrape interval
  interval: 30s
  # -- Scrape timeout
  scrapeTimeout: 10s
  # -- Additional labels for ServiceMonitor selection
  labels: {}
  # -- Target labels copied from Service to Prometheus target labels
  targetLabels: []
  # -- Pod labels copied from Pod to Prometheus target labels
  podTargetLabels: []
  # -- Whether Prometheus should honor labels from scraped metrics
  honorLabels: false
  # -- Whether Prometheus should honor timestamps from scraped metrics
  honorTimestamps: true
  # -- Optional proxy URL for scraping
  proxyUrl: ""
  # -- Per-scrape sample limit. 0 means no limit.
  sampleLimit: 0
  # -- Per-scrape target limit. 0 means no limit.
  targetLimit: 0
  # -- Per-scrape label limit. 0 means no limit.
  labelLimit: 0
  # -- Per-scrape label name length limit. 0 means no limit.
  labelNameLengthLimit: 0
  # -- Per-scrape label value length limit. 0 means no limit.
  labelValueLengthLimit: 0
  # -- Metric relabeling rules
  metricRelabelings: []
  # -- Target relabeling rules
  relabelings: []
  # -- TLS config for scraping the exporter when tls.enabled=true
  tlsConfig: {}
  # -- Basic auth config for scraping /metrics when webConfig enables basic_auth_users
  basicAuth: {}

# Web configuration for TLS and basic auth (--web.config.file).
# See: https://github.com/prometheus/exporter-toolkit/blob/master/docs/web-configuration.md
webConfig:
  # -- Enable web config (mounts a Secret with web-config.yaml and passes --web.config.file)
  enabled: false
  # -- Existing Secret name containing a `web-config.yaml` key. When set, chart will not create the web config Secret.
  secretName: ""
  # -- Inline web-config.yaml content. When `tls.enabled`, `tls_server_config` is auto-injected. Passwords in `basic_auth_users` must be bcrypt-hashed.
  data: {}
    # basic_auth_users:
    #   admin: "$2y$10$..."

# TLS configuration for the exporter's own endpoints.
tls:
  # -- Enable TLS for the exporter's own HTTP endpoints. Requires secretName or certManager.enabled=true.
  enabled: false
  # -- TLS Secret name to mount. With cert-manager enabled, this is the Secret cert-manager writes to. Defaults to a generated name.
  secretName: ""
  # -- Mount path for TLS cert/key inside the container
  mountPath: /etc/tls
  # cert-manager Certificate resource (optional)
  certManager:
    # -- Create a cert-manager Certificate resource to provision the TLS Secret
    enabled: false
    # Issuer reference — must exist in the cluster
    issuerRef:
      # -- Issuer name
      name: ""
      # -- Issuer kind (Issuer or ClusterIssuer)
      kind: ClusterIssuer
    # -- Certificate duration
    duration: 8760h
    # -- Renew before expiry
    renewBefore: 720h
    # -- DNS names for the certificate (defaults to service FQDN)
    dnsNames: []
    #  - ssl-exporter.monitoring.svc

# Exporter module configuration.
config:
  # -- Enable config file (creates ConfigMap and passes --config.file)
  enabled: true
  # -- Use an existing ConfigMap (config.data is ignored when set)
  existingConfigMap: ""
  # -- Exporter configuration in YAML
  data: |
    modules:
      https:
        prober: https
      tcp:
        prober: tcp
      file:
        prober: file
      kubernetes:
        prober: kubernetes
