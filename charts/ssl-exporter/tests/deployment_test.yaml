suite: deployment
templates:
  - deployment.yaml
  - configmap.yaml
  - secret-web-config.yaml
tests:
  - it: renders with defaults
    template: deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.revisionHistoryLimit
          value: 10
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/piotrkochan/ssl_exporter:2.6.1
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - --web.probe-path=/probe
            - --web.listen-address=:9219
            - --config.file=/config/config.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /config
            readOnly: true
      - isNull:
          path: spec.template.spec.containers[0].env

  - it: does not have web-config volume when webConfig disabled
    template: deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --web.config.file=/etc/web-config/web-config.yaml
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: web-config
          any: true

  - it: adds web-config arg and volume when webConfig enabled
    template: deployment.yaml
    set:
      webConfig:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --web.config.file=/etc/web-config/web-config.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: web-config
            mountPath: /etc/web-config
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: web-config
            secret:
              secretName: RELEASE-NAME-ssl-exporter-web-config

  - it: uses existing web-config secret name
    template: deployment.yaml
    set:
      webConfig:
        enabled: true
        secretName: my-web-config
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: web-config
            secret:
              secretName: my-web-config

  - it: adds tls volume when tls enabled with secretName
    template: deployment.yaml
    set:
      tls:
        enabled: true
        secretName: my-tls
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls-certs
            mountPath: /etc/tls
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tls-certs
            secret:
              secretName: my-tls

  - it: enables web-config and https probes when tls enabled
    template: deployment.yaml
    set:
      tls:
        enabled: true
        secretName: my-tls
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --web.config.file=/etc/web-config/web-config.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: web-config
            mountPath: /etc/web-config
            readOnly: true
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.scheme
          value: HTTPS
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.scheme
          value: HTTPS

  - it: uses generated tls secret name when no secretName
    template: deployment.yaml
    set:
      tls:
        enabled: true
        certManager:
          enabled: true
          issuerRef:
            name: letsencrypt
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tls-certs
            secret:
              secretName: RELEASE-NAME-ssl-exporter-tls

  - it: respects custom tls mountPath
    template: deployment.yaml
    set:
      tls:
        enabled: true
        secretName: my-tls
        mountPath: /custom/tls
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls-certs
            mountPath: /custom/tls
            readOnly: true

  - it: does not have tls volume when tls disabled
    template: deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: tls-certs
          any: true

  - it: renders all volumes together
    template: deployment.yaml
    set:
      webConfig:
        enabled: true
      tls:
        enabled: true
        secretName: my-tls
      extraVolumes:
        - name: extra
          emptyDir: {}
    asserts:
      - lengthEqual:
          path: spec.template.spec.volumes
          count: 4
      - lengthEqual:
          path: spec.template.spec.containers[0].volumeMounts
          count: 3

  - it: renders extra args
    template: deployment.yaml
    set:
      extraArgs:
        - --log.level=debug
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --log.level=debug

  - it: renders extra env
    template: deployment.yaml
    set:
      extraEnv:
        - name: HTTPS_PROXY
          value: "http://proxy:8080"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTPS_PROXY
            value: "http://proxy:8080"

  - it: renders extra env from
    template: deployment.yaml
    set:
      extraEnvFrom:
        - secretRef:
            name: ssl-exporter-env
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: ssl-exporter-env

  - it: renders deployment annotations and scheduling values
    template: deployment.yaml
    set:
      global:
        imageRegistry: registry.example.com
      image:
        digest: sha256:abc123
      namespaceOverride: monitoring
      deploymentAnnotations:
        reloader.stakater.com/auto: "true"
      revisionHistoryLimit: 3
      strategy:
        type: Recreate
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 1.1.1.1
      priorityClassName: monitoring
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ssl-exporter
    asserts:
      - equal:
          path: metadata.namespace
          value: monitoring
      - equal:
          path: metadata.annotations["reloader.stakater.com/auto"]
          value: "true"
      - equal:
          path: spec.revisionHistoryLimit
          value: 3
      - equal:
          path: spec.strategy.type
          value: Recreate
      - isNull:
          path: spec.strategy.rollingUpdate
      - equal:
          path: spec.template.spec.dnsPolicy
          value: None
      - contains:
          path: spec.template.spec.dnsConfig.nameservers
          content: 1.1.1.1
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/piotrkochan/ssl_exporter@sha256:abc123
      - equal:
          path: spec.template.spec.priorityClassName
          value: monitoring
      - lengthEqual:
          path: spec.template.spec.topologySpreadConstraints
          count: 1
