suite: service
templates:
  - service.yaml
tests:
  - it: renders with defaults
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 9219

  - it: uses custom port
    set:
      service:
        port: 8443
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8443

  - it: renders dual stack fields
    set:
      service:
        ipDualStack:
          enabled: true
          ipFamilies:
            - IPv6
            - IPv4
          ipFamilyPolicy: RequireDualStack
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: RequireDualStack
      - equal:
          path: spec.ipFamilies
          value:
            - IPv6
            - IPv4

  - it: renders labels and annotations
    set:
      commonLabels:
        app.kubernetes.io/part-of: monitoring
      service:
        labels:
          example.com/team: platform
        annotations:
          prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: metadata.labels["example.com/team"]
          value: platform
      - equal:
          path: metadata.labels["app.kubernetes.io/part-of"]
          value: monitoring
      - equal:
          path: metadata.annotations["prometheus.io/scrape"]
          value: "true"
