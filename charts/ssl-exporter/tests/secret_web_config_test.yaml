suite: secret-web-config
templates:
  - secret-web-config.yaml
tests:
  - it: is not created when webConfig disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: is not created when existingSecret is set
    set:
      webConfig:
        enabled: true
        existingSecret: my-web-config
    asserts:
      - hasDocuments:
          count: 0

  - it: is created when webConfig enabled without existingSecret
    set:
      webConfig:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ssl-exporter-web-config
      - equal:
          path: type
          value: Opaque

  - it: generates empty config when no data and no tls
    set:
      webConfig:
        enabled: true
    asserts:
      - matchSnapshot: {}

  - it: injects tls_server_config when tls enabled
    set:
      webConfig:
        enabled: true
      tls:
        enabled: true
        mountPath: /etc/tls
    asserts:
      - matchSnapshot: {}

  - it: injects tls_server_config with custom mountPath
    set:
      webConfig:
        enabled: true
      tls:
        enabled: true
        mountPath: /custom/certs
    asserts:
      - matchSnapshot: {}

  - it: merges user data with tls config
    set:
      webConfig:
        enabled: true
        data:
          basic_auth_users:
            admin: "$2y$10$hash"
      tls:
        enabled: true
        mountPath: /etc/tls
    asserts:
      - matchSnapshot: {}

  - it: renders basic_auth_users without tls
    set:
      webConfig:
        enabled: true
        data:
          basic_auth_users:
            admin: "$2y$10$hash"
    asserts:
      - matchSnapshot: {}
