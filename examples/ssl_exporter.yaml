default_module: https
modules:
  https:
    prober: https
  https_insecure:
    prober: https
    tls_config:
      insecure_skip_verify: true
  https_renegotiation:
    prober: https
    tls_config:
      renegotiation: freely
  https_proxy:
    prober: https
    https:
      proxy_url: "socks5://localhost:8123"
  https_timeout:
    prober: https
    timeout: 3s
  tcp:
    prober: tcp
  tcp_servername:
    prober: tcp
    tls_config:
      server_name: example.com
  tcp_client_auth:
    prober: tcp
    tls_config:
      ca_file: /etc/tls/ca.crt
      cert_file: /etc/tls/tls.crt
      key_file: /etc/tls/tls.key
  tcp_smtp_starttls:
    prober: tcp
    tcp:
      starttls: smtp
  tcp_mysql_starttls:
    prober: tcp
    tcp:
      starttls: mysql
    tls_config:
      insecure_skip_verify: true
  file:
    prober: file
  file_ca_certificates:
    prober: file
    target: /etc/ssl/certs/ca-certificates.crt
  keystore:
    prober: keystore
    keystore:
      # Reads JKS and PKCS12 keystores (autodetected). Provide the password
      # inline or, preferably, via password_file.
      password: changeit
      # password_file: /etc/ssl_exporter/keystore_password
  http_file:
    prober: http_file
  http_file_proxy:
    prober: http_file
    http_file:
      proxy_url: "socks5://localhost:8123"
  kubernetes:
    prober: kubernetes
  kubernetes_kubeconfig:
    prober: kubernetes
    kubernetes:
      kubeconfig: /root/.kube/config
  kubeconfig:
    prober: kubeconfig
  tls_cipher:
    prober: tls_cipher
    tls_cipher:
      # cipher_set: "insecure" (default) or "all"
      cipher_set: all
      # key_exchange_set: "pqc" (default) or "all"
      key_exchange_set: pqc
      # cache_ttl: 1h (default)
      cache_ttl: 5m
      # cache_mode: "hostname" (default), "ip" (deduplicate shared IPs), "sni" (ip + SNI for CDNs)
      # cache_mode: ip
